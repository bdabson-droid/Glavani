name: Build static site

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: site-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          npm install
          pip install pillow

      - name: Build site for production
        env:
          SITE_BASE: https://glavani-park.com
        run: python3 scripts/build_site.py

      - name: Verify build output
        run: python3 scripts/verify_site.py

      - name: Check Cloudflare Functions compile
        run: npx wrangler pages functions build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: glavani-park-static
          path: |
            assets
            en
            hr
            images
            functions
            index.html
            404.html
            robots.txt
            sitemap.xml
            _redirects
            _headers
            manifest.webmanifest
            package.json
