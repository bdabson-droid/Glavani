name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pillow

      - name: Build site for production
        env:
          SITE_BASE: https://www.glavani-park.com
        run: python3 scripts/build_site.py

      - name: Verify build output
        run: |
          test -f en/reservation/index.html
          test ! -d en/book
          ! grep -r 'preview-banner' en hr index.html 404.html || (echo 'Preview banners still in build' && exit 1)
          ! grep -r 'preview-booking-guard' en hr || (echo 'Preview guard still referenced' && exit 1)
          grep -q 'href="reservation/"' en/index.html
          grep -q 'booking-app' en/reservation/index.html

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp -r assets en hr images _site/
          cp index.html 404.html robots.txt sitemap.xml _redirects _headers manifest.webmanifest _site/
          touch _site/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
